version: '3.8'

services:
  postgres_db:
    image: postgres:16-alpine
    container_name: moj_postgres_auth
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: qwerty
      POSTGRES_DB: database
    ports:
      - "5432:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data

      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_auth_data:
